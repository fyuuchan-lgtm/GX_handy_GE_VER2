name: Deploy public guide page

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "docs/landing/yakupita-pages/**"
      - "docs/user-guide/**"
      - ".github/workflows/pages-public-guide.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: public-guide-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/landing/yakupita-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
