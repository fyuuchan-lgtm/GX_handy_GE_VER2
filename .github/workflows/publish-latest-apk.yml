name: Publish latest APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - ".github/workflows/publish-latest-apk.yml"
      - "app/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "docs/landing/yakupita/privacy.html"
      - "docs/landing/yakupita/index.html"
      - "docs/play-console/**"

permissions:
  contents: write

concurrency:
  group: publish-latest-apk
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Prepare signing
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$RELEASE_STORE_PASSWORD"
          test -n "$RELEASE_KEY_ALIAS"
          test -n "$RELEASE_KEY_PASSWORD"
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/yakupita-release.keystore"
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Build release APK
        run: ./gradlew :app:publishDownloadApk -PdownloadApkVariant=release
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/yakupita-release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Update public download APK
        run: |
          mkdir -p docs/landing/yakupita/downloads
          cp build/distributions/yakupita-latest.apk docs/landing/yakupita/downloads/yakupita-latest.apk

      - name: Commit public download APK
        run: |
          if git diff --quiet -- docs/landing/yakupita/downloads/yakupita-latest.apk; then
            echo "Public APK is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/landing/yakupita/downloads/yakupita-latest.apk
          git commit -m "Update public download APK [skip ci]"
          git push

      - name: Publish latest release asset
        run: |
          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest --title "Latest Yakupita APK" --notes "Latest APK for LINE and QR code distribution."
          fi
          gh release upload latest build/distributions/yakupita-latest.apk --clobber
        env:
          GH_TOKEN: ${{ github.token }}
