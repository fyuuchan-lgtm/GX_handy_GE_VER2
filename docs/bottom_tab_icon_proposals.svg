    <path d="M44 12 H62 V20 H44 Z M42 20 H64 V38 H42 Z M53 25 V34 M48 30 H58" class="icon thin"/>
    <text x="98" y="31" text-anchor="middle" font-size="16" fill="#102a3a" font-family="sans-serif">充填</text>
  </g>
  <g transform="translate(702 630)">
    <rect x="0" y="0" width="144" height="48" rx="6" fill="#e7f6fb"/>
    <path d="M54 12 A12 12 0 1 0 54 36 A12 12 0 1 0 54 12 M54 21 A3 3 0 1 0 54 27 A3 3 0 1 0 54 21" class="icon thin"/>
