<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720">
  <defs>
    <linearGradient id="badgeGrad" x1="0" y1="12" x2="0" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dff5fc"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="58" y1="20" x2="86" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d6f0f8"/>
    </linearGradient>
    <linearGradient id="bottleGrad" x1="61" y1="22" x2="83" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#aee5f4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#083a4f" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 24px sans-serif; fill: #102a3a; }
      .label { font: 600 18px sans-serif; fill: #102a3a; }
      .note { font: 14px sans-serif; fill: #456; }
      .bar { fill: #ffffff; stroke: #d7e8ef; stroke-width: 2; }
      .tab { fill: #ffffff; }
      .tab-active { fill: #0d6efd; }
      .icon { fill: none; stroke: #145f7c; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .icon-active { fill: none; stroke: #ffffff; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 4; }
    </style>
  </defs>

  <rect width="960" height="720" fill="#f7f9fc"/>
  <text x="48" y="54" class="title">Bottom tab icon proposals</text>
  <text x="48" y="80" class="note">Tabs: ホーム / 監査モード / 帳票モード / 充填モード / データ更新</text>
  <text x="48" y="102" class="note">Selected: blue background + white icon/text. Unselected: white background + blue icon + dark text.</text>

  <!-- Proposal A -->
  <text x="48" y="130" class="label">A. Simple line icons</text>
  <text x="48" y="154" class="note">Current UIに近い。文字ラベルと一緒でも見やすい案。</text>
  <rect x="48" y="178" width="864" height="112" rx="0" class="bar"/>
  <g transform="translate(78 194)">
    <rect x="0" y="0" width="144" height="80" rx="10" class="tab-active"/>
    <path d="M48 42 L72 22 L96 42 M56 38 V60 H88 V38" class="icon-active"/>
    <text x="72" y="72" text-anchor="middle" font-size="15" fill="#ffffff" font-family="sans-serif">ホーム</text>
  </g>
  <g transform="translate(234 194)">
    <rect x="0" y="0" width="144" height="80" rx="10" class="tab"/>
    <path d="M54 24 H90 V58 H54 Z M62 34 H82 M62 44 H78" class="icon"/>
    <path d="M91 57 L101 67" class="icon thin"/>
    <text x="72" y="72" text-anchor="middle" font-size="15" fill="#102a3a" font-family="sans-serif">監査</text>
  </g>
  <g transform="translate(390 194)">
    <rect x="0" y="0" width="144" height="80" rx="10" class="tab"/>
    <path d="M54 20 H88 L98 30 V60 H54 Z M88 20 V30 H98 M62 40 H88 M62 50 H82" class="icon"/>
    <text x="72" y="72" text-anchor="middle" font-size="15" fill="#102a3a" font-family="sans-serif">帳票</text>
  </g>
  <g transform="translate(546 194)">
    <rect x="0" y="0" width="144" height="80" rx="10" class="tab"/>
    <path d="M60 22 H84 V32 H60 Z M58 32 H86 V60 H58 Z M66 44 H78 M72 38 V54" class="icon"/>
    <text x="72" y="72" text-anchor="middle" font-size="15" fill="#102a3a" font-family="sans-serif">充填</text>
  </g>
  <g transform="translate(702 194)">
    <rect x="0" y="0" width="144" height="80" rx="10" class="tab"/>
    <path d="M72 24 A18 18 0 1 0 72 60 A18 18 0 1 0 72 24 M72 36 A6 6 0 1 0 72 48 A6 6 0 1 0 72 36" class="icon"/>
    <path d="M72 18 V24 M72 60 V66 M48 42 H54 M90 42 H96 M55 25 L59 30 M89 54 L94 59 M89 30 L94 25 M55 59 L59 54" class="icon thin"/>
    <text x="72" y="72" text-anchor="middle" font-size="15" fill="#102a3a" font-family="sans-serif">設定</text>
  </g>

  <!-- Proposal B -->
