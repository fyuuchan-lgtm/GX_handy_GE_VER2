    <path d="M42 10 H62 L70 18 V36 H42 Z M62 10 V18 H70 M48 26 H64" class="icon thin"/>
    <text x="98" y="31" text-anchor="middle" font-size="16" fill="#102a3a" font-family="sans-serif">帳票</text>
  </g>
  <g transform="translate(546 630)">
