  <text x="48" y="376" class="note">白背景に、シンプルで視認性の高い業務アイコン。選択中だけ色を反転。</text>
  <rect x="48" y="400" width="864" height="112" rx="0" class="bar"/>
  <g transform="translate(78 416)">
    <rect x="0" y="0" width="144" height="80" rx="4" fill="#ffffff"/>
    <rect x="50" y="8" width="44" height="44" rx="14" fill="#f2fbff"/>
    <path d="M56 32 L72 18 L88 32 H84 V47 H76 V39 H68 V47 H60 V32 Z" fill="none" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="74" text-anchor="middle" font-size="14" fill="#102a3a" font-family="sans-serif">ホーム</text>
  </g>
  <g transform="translate(234 416)">
    <rect x="0" y="0" width="144" height="80" rx="4" fill="#0d6efd"/>
    <rect x="50" y="8" width="44" height="44" rx="14" fill="#ffffff" opacity="0.16"/>
    <path d="M60 20 H84 V47 H60 Z" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
