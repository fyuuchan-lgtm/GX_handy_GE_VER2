    <path d="M64 33 L70 39 L82 27" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="72" y="74" text-anchor="middle" font-size="14" fill="#ffffff" font-family="sans-serif">監査モード</text>
  </g>
  <g transform="translate(390 416)">
    <rect x="0" y="0" width="144" height="80" rx="4" fill="#ffffff"/>
    <rect x="50" y="8" width="44" height="44" rx="14" fill="#f2fbff"/>
    <path d="M60 17 H78 L86 25 V47 H60 Z" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M78 17 V25 H86" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M66 40 V34 M72 40 V28 M78 40 V35" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round"/>
    <text x="72" y="74" text-anchor="middle" font-size="14" fill="#102a3a" font-family="sans-serif">帳票モード</text>
  </g>
  <g transform="translate(546 416)">
    <rect x="0" y="0" width="144" height="80" rx="4" fill="#ffffff"/>
    <rect x="50" y="8" width="44" height="44" rx="14" fill="#f2fbff"/>
    <path d="M66 18 H78" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M64 22 H80 V28 C83 30 85 34 85 39 V45 C85 47 83 49 81 49 H63 C61 49 59 47 59 45 V39 C59 34 61 30 64 28 Z" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M63 31 H81" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M72 36 V45 M67.5 40.5 H76.5" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round"/>
    <text x="72" y="74" text-anchor="middle" font-size="14" fill="#102a3a" font-family="sans-serif">充填モード</text>
  </g>
  <g transform="translate(702 416)">
    <rect x="0" y="0" width="144" height="80" rx="4" fill="#ffffff"/>
    <rect x="50" y="8" width="44" height="44" rx="14" fill="#f2fbff"/>
    <path d="M59 31 C61 24 66 20 73 20 C78 20 82 23 85 27" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M85 27 L85 20 L90 25" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M85 37 C83 44 78 48 71 48 C66 48 62 45 59 41" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M59 41 L59 48 L54 43" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M66 30 H78 M66 38 H78" stroke="#145f7c" stroke-width="2.8" stroke-linecap="round"/>
    <text x="72" y="74" text-anchor="middle" font-size="14" fill="#102a3a" font-family="sans-serif">データ更新</text>
  </g>

  <!-- Proposal C -->
  <text x="48" y="574" class="label">C. Compact toolbar style</text>
  <text x="48" y="598" class="note">業務端末っぽく、情報領域を広く残す薄型案。</text>
  <rect x="48" y="622" width="864" height="64" rx="0" class="bar"/>
  <g transform="translate(78 630)">
    <rect x="0" y="0" width="144" height="48" rx="6" fill="#0d6efd"/>
