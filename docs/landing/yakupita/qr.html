<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ヤクピタ APK ダウンロードQR</title>
  <meta name="description" content="ヤクピタ APK をAndroid端末にダウンロードするためのQRコードです。">
  <style>
    :root {
      --ink: #132033;
      --muted: #5d6a7c;
      --blue: #0a67b2;
      --line: #d9e2ec;
      --soft: #f7fbfd;
      --white: #ffffff;
      --warning: #8a5b00;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      background: var(--soft);
      line-height: 1.6;
    }

    main {
      width: min(560px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 8vw, 46px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .lead {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 17px;
      font-weight: 700;
    }

    .qr {
      width: min(82vw, 360px);
      height: min(82vw, 360px);
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
    }

    .url {
      display: block;
      margin: 18px 0 0;
      padding: 12px;
      overflow-wrap: anywhere;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--blue);
      background: var(--white);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    .note {
      margin: 14px 0 0;
      color: var(--warning);
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>ヤクピタ APK</h1>
    <p class="lead">Android端末のカメラで読み取ると、最新版APKのダウンロードが始まります。</p>
    <img class="qr" id="download-qr" src="" alt="ヤクピタ APK ダウンロードURLのQRコード">
    <a class="url" id="download-url" href="https://raw.githubusercontent.com/fyuuchan-lgtm/GX_handy_GE_VER2/master/docs/landing/yakupita/downloads/yakupita-latest.apk">
      https://raw.githubusercontent.com/fyuuchan-lgtm/GX_handy_GE_VER2/master/docs/landing/yakupita/downloads/yakupita-latest.apk
    </a>
    <p class="note">インストール時に、Androidの確認画面で「不明なアプリのインストール」を許可してください。</p>
  </main>
  <script>
    const apkUrl = "https://raw.githubusercontent.com/fyuuchan-lgtm/GX_handy_GE_VER2/master/docs/landing/yakupita/downloads/yakupita-latest.apk";
    const downloadUrl = document.querySelector("#download-url");
    const downloadQr = document.querySelector("#download-qr");

    downloadUrl.href = apkUrl;
    downloadUrl.textContent = apkUrl;
    downloadQr.src = `https://api.qrserver.com/v1/create-qr-code/?size=360x360&data=${encodeURIComponent(apkUrl)}`;
  </script>
</body>
</html>
