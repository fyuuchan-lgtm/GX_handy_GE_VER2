<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ヤクピタ ユーザーガイド</title>
  <meta name="description" content="ヤクピタのユーザーガイド案内ページ。PDF版、HTML版、GitHub の参照先をまとめています。">
  <style>
    :root {
      --ink: #132033;
      --muted: #5d6a7c;
      --blue: #0a67b2;
      --line: #d9e2ec;
      --soft: #f7fbfd;
      --white: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      line-height: 1.75;
      background: linear-gradient(180deg, #f9fcfe 0%, #eef7fb 100%);
    }
    .wrap { width: min(920px, calc(100% - 32px)); margin: 0 auto; padding: 40px 0 48px; }
    .card {
      padding: 28px;
      border: 1px solid rgba(10, 103, 178, 0.16);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 18px 48px rgba(19, 32, 51, 0.12);
    }
    h1 { margin: 0 0 10px; font-size: clamp(32px, 5vw, 54px); line-height: 1; }
    p { margin: 0 0 14px; color: var(--muted); }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 12px;
      border: 2px solid var(--blue);
      color: inherit;
      text-decoration: none;
      font-weight: 800;
    }
    .primary { color: var(--white); background: var(--blue); }
    .panel {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--soft);
    }
    ul { margin: 0; padding-left: 1.2em; }
    li + li { margin-top: 8px; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>ユーザーガイド</h1>
      <p>正本は GitHub の <code>docs/user-guide/</code> に置く運用だっちゃ。ここでは PDF と HTML の入口だけまとめてあるよ。</p>
      <div class="actions">
        <a class="primary" href="https://raw.githubusercontent.com/fyuuchan-lgtm/GX_handy_GE_VER2/master/docs/user-guide/yakupita-user-guide.pdf">PDFを開く</a>
        <a href="https://github.com/fyuuchan-lgtm/GX_handy_GE_VER2/blob/master/docs/user-guide/yakupita-user-guide.html">HTML版を見る</a>
        <a href="index.html">公開ページへ戻る</a>
      </div>
      <div class="panel">
        <ul>
          <li>Facebook 共有には公開ページの URL を貼る。</li>
          <li>配布物の確認は PDF 版を使う。</li>
          <li>ソース参照は GitHub の HTML 版から行う。</li>
        </ul>
      </div>
    </section>
  </main>
</body>
</html>
