<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ヤクピタ QRコード</title>
  <meta name="description" content="ヤクピタのユーザーガイドPDFへ飛ぶQRコードページです。">
  <style>
    :root { --ink: #132033; --muted: #5d6a7c; --blue: #0a67b2; --line: #d9e2ec; --white: #ffffff; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      background: linear-gradient(180deg, #f9fcfe 0%, #eef7fb 100%);
    }
    main {
      width: min(560px, 100%);
      text-align: center;
      padding: 28px;
      border: 1px solid rgba(10, 103, 178, 0.16);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 18px 48px rgba(19, 32, 51, 0.12);
    }
    h1 { margin: 0 0 12px; font-size: clamp(30px, 8vw, 46px); line-height: 1.1; }
    p { margin: 0 0 18px; color: var(--muted); }
    img {
      width: min(82vw, 360px);
      height: min(82vw, 360px);
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--white);
    }
    a {
      display: block;
      margin-top: 18px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--blue);
      font-weight: 800;
      text-decoration: none;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <h1>QRコード</h1>
    <p>ユーザーガイド PDF の直通 QR だっちゃ。</p>
    <img id="qr" alt="ユーザーガイドPDFのQRコード">
    <a href="https://raw.githubusercontent.com/fyuuchan-lgtm/GX_handy_GE_VER2/master/docs/user-guide/yakupita-user-guide.pdf">PDFのURLを開く</a>
  </main>
  <script>
    const target = "https://raw.githubusercontent.com/fyuuchan-lgtm/GX_handy_GE_VER2/master/docs/user-guide/yakupita-user-guide.pdf";
    document.querySelector("#qr").src = `https://api.qrserver.com/v1/create-qr-code/?size=360x360&data=${encodeURIComponent(target)}`;
  </script>
</body>
</html>
